---
- name: Configure hybrid cloud VMs
  hosts: all
  become: true

  vars:
    testuser_name: testuser
    testuser_public_key: "{{ lookup('file', '~/.ssh/azure.pub') }}"
    container_image: "ghcr.io/themagicalwizardd/hybrid-cloud:latest"

  pre_tasks:
    - name: Create testuser
      ansible.builtin.user:
        name: "{{ testuser_name }}"
        shell: /bin/bash
        groups: sudo
        append: true
        create_home: true

    - name: Create .ssh directory for testuser
      ansible.builtin.file:
        path: "/home/{{ testuser_name }}/.ssh"
        state: directory
        owner: "{{ testuser_name }}"
        group: "{{ testuser_name }}"
        mode: '0700'

    - name: Add public key to testuser authorized_keys
      ansible.posix.authorized_key:
        user: "{{ testuser_name }}"
        key: "{{ testuser_public_key }}"

  roles:
    - docker_role

  tasks:
    - name: Pull CI-built Hello World Docker image
      community.docker.docker_image:
        name: "{{ container_image }}"
        source: pull
        force_source: true

    - name: Run Hello World container
      community.docker.docker_container:
        name: hello-hybrid
        image: "{{ container_image }}"
        state: started
        recreate: true
        restart_policy: always
        published_ports:
          - "8080:80"
