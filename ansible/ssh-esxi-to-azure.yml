---
- name: Configure SSH from ESXi VM to Azure VM
  hosts: esxi
  become: true

  vars:
    testuser_name: testuser
    azure_vm_ip: "{{ hostvars['azure-vm']['ansible_host'] }}"

  tasks:
    - name: Generate SSH key for testuser on ESXi VM
      community.crypto.openssh_keypair:
        path: "/home/{{ testuser_name }}/.ssh/id_ed25519"
        type: ed25519
        owner: "{{ testuser_name }}"
        group: "{{ testuser_name }}"
        mode: '0600'
      register: esxi_key

    - name: Save ESXi public key as host fact
      set_fact:
        esxi_testuser_public_key: "{{ esxi_key.public_key }}"

- name: Add ESXi testuser public key to Azure VM
  hosts: azure
  become: true

  vars:
    testuser_name: testuser

  tasks:
    - name: Authorize ESXi testuser key on Azure testuser
      ansible.posix.authorized_key:
        user: "{{ testuser_name }}"
        key: "{{ hostvars['esxi-vm']['esxi_testuser_public_key'] }}"

- name: Test SSH from ESXi VM to Azure VM
  hosts: esxi
  become: true

  vars:
    testuser_name: testuser
    azure_vm_ip: "{{ hostvars['azure-vm']['ansible_host'] }}"

  tasks:
    - name: Add Azure VM to known_hosts for testuser
      shell: "ssh-keyscan -H {{ azure_vm_ip }} > /home/{{ testuser_name }}/.ssh/known_hosts"
      changed_when: false

    - name: Set known_hosts permissions
      file:
        path: "/home/{{ testuser_name }}/.ssh/known_hosts"
        owner: "{{ testuser_name }}"
        group: "{{ testuser_name }}"
        mode: '0644'

    - name: Test SSH from ESXi VM to Azure VM as testuser
      command: >
        sudo -u {{ testuser_name }}
        ssh -i /home/{{ testuser_name }}/.ssh/id_ed25519
        -o BatchMode=yes
        -o StrictHostKeyChecking=yes
        testuser@{{ azure_vm_ip }}
        hostname
      register: ssh_test
      changed_when: false

    - name: Show SSH test result
      debug:
        var: ssh_test.stdout
